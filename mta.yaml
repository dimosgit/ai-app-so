_schema-version: "3.1"
ID: ai-app-so
version: 1.0.0
modules:
  - name: ai-app-so-srv
    type: nodejs
    path: gen/srv
    parameters:
      memory: 256M
      disk-quota: 512M
      health-check-type: process
      start-timeout: 300
    requires:
      - name: ai-app-so-db
      - name: ai-app-so-auth
      - name: ai-app-so-destination-service
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  - name: ai-app-so-app-router
    type: approuter.nodejs
    path: app/router
    parameters:
      disk-quota: 512M
      memory: 256M
    requires:
      - name: ai-app-so-auth
      - name: ai-app-so-html5-repo-runtime
      - name: srv-api
        group: destinations
        properties:
          forwardAuthToken: true
          name: srv-api
          url: ~{srv-url}

  - name: ai-app-so-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 256M
      health-check-type: none
      no-route: true
    requires:
      - name: ai-app-so-db

  - name: ai-app-so-app-deployer
    type: com.sap.application.content
    path: .
    requires:
      - name: ai-app-so-html5-repo-host
        parameters:
          content-target: true
    parameters:
      memory: 128M
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - salesorders.zip
          name: salesorders
          target-path: resources/

  - name: ai-app-so-destination-content
    type: com.sap.application.content
    path: .
    requires:
      - name: ai-app-so-destination-service
        parameters:
          content-target: true
      - name: ai-app-so-html5-repo-host
        parameters:
          service-key:
            name: ai-app-so-html5-repo-host-key
      - name: ai-app-so-auth
        parameters:
          service-key:
            name: ai-app-so-auth-key
    parameters:
      content:
        instance:
          destinations:
            - Name: ai-app-so-html5-repo-host
              ServiceInstanceName: ai-app-so-html5-repo-host
              ServiceKeyName: ai-app-so-html5-repo-host-key
              sap.cloud.service: ai.app.so
            - Name: ai-app-so-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: ai-app-so-auth
              ServiceKeyName: ai-app-so-auth-key
              sap.cloud.service: ai.app.so
          existing_destinations_policy: update
        subaccount:
          destinations:
            - Name: ai-app-so-html5-repo-host
              ServiceInstanceName: ai-app-so-html5-repo-host
              ServiceKeyName: ai-app-so-html5-repo-host-key
              sap.cloud.service: ai.app.so
          existing_destinations_policy: update
    build-parameters:
      no-source: true

  - name: salesorders
    type: html5
    path: app/salesorders
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []

resources:
  - name: ai-app-so-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: ai-app-so-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: ai-app-so-westernacher-global-dev-Global-Development
        tenant-mode: dedicated
        role-collections:
          - name: "SalesOrderReviewer"
            description: "Review Sales Orders"
            role-template-references:
              - $XSAPPNAME.UserRole

  - name: ai-app-so-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_Enabled: true
        init_data:
          instance:
            destinations:
              - Name: srv-api
                Description: CAP Backend API
                Authentication: NoAuthentication
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
            existing_destinations_policy: update
          subaccount:
            destinations:
              - Name: srv-api
                Description: CAP Backend API
                Authentication: NoAuthentication
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
                sap.cloud.service: ai.app.so
            existing_destinations_policy: update
    requires:
      - name: srv-api

  - name: ai-app-so-html5-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  - name: ai-app-so-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
