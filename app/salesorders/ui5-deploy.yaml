specVersion: '3.1'
metadata:
  name: salesorders
type: application
builder:
  resources:
    excludes:
      - "/test/**"
      - "/localService/**"
  customTasks:
  - name: ui5-task-zipper
    afterTask: generateCachebusterInfo
    configuration:
        archiveName: salesorders
        includeEmptyDirectories: true
